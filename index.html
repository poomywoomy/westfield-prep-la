    <script type="application/ld+json">{"@context":"https://schema.org","@type":"FAQPage","name":"Getting Started FAQs","mainEntity":[{"@type":"Question","name":"What makes Westfield Prep Center different?","acceptedAnswer":{"@type":"Answer","text":"We're a boutique prep center, which means our dedicated team can check in products and ship them out much faster than traditional large-scale fulfillment centers. You get personalized attention and quicker turnaround times."}},{"@type":"Question","name":"How do I get started?","acceptedAnswer":{"@type":"Answer","text":"Simply fill out our contact form with your business details and monthly volume. We'll respond with an onboarding packet and pricing sheet tailored to your needs within 24 hours."}},{"@type":"Question","name":"What's the onboarding process like?","acceptedAnswer":{"@type":"Answer","text":"Our onboarding process is designed to be quick and seamless. After your initial inquiry, we'll send you an onboarding packet with service agreements and instructions. Once paperwork is complete, you can start sending inventory within 48 hours. We'll provide receiving instructions, warehouse address, and your dedicated account manager contact."}},{"@type":"Question","name":"What information do you need from me?","acceptedAnswer":{"@type":"Answer","text":"We'll need your business name, contact information, types of products you sell, estimated monthly volume, and the marketplaces you sell on (Shopify, Amazon, TikTok Shop, etc.). This helps us create a customized service plan and pricing structure for your needs."}},{"@type":"Question","name":"What are the payment terms for new clients?","acceptedAnswer":{"@type":"Answer","text":"New clients are required to provide a mandatory $300 deposit at the beginning of the month for the first 2 months of service. This deposit will be charged for prep work completed during the month. Any remaining balance, if any, will be charged at the end of the month."}},{"@type":"Question","name":"Is there a minimum order quantity or monthly volume requirement?","acceptedAnswer":{"@type":"Answer","text":"No hard minimum, but our platform, pricing, and operations are purpose-built for brands shipping 1,000+ orders per month. If you're scaling toward that volume, we'd still love to talk."}},{"@type":"Question","name":"Can you handle large volumes?","acceptedAnswer":{"@type":"Answer","text":"Absolutely. Our sweet spot is brands doing 1,000 to 50,000+ orders per month, and we scale to enterprise-level volume. Contact us to discuss volume pricing."}}]}</script>
    <script type="application/ld+json">{"@context":"https://schema.org","@type":"FAQPage","name":"General Operations FAQs","mainEntity":[{"@type":"Question","name":"What are your business hours?","acceptedAnswer":{"@type":"Answer","text":"Our warehouse operates Monday through Friday, 8:00 AM to 5:00 PM Pacific Time. We process orders during business hours and offer after-hours emergency support for urgent situations. Same-day shipping cutoff is 2:00 PM PST."}},{"@type":"Question","name":"How can I contact customer support?","acceptedAnswer":{"@type":"Answer","text":"You can reach us by phone at (818) 935-5478 during business hours, or submit inquiries through our contact form anytime. Each client is assigned a dedicated account manager who will be your primary point of contact for all questions and updates."}},{"@type":"Question","name":"Can I schedule a virtual walkthrough?","acceptedAnswer":{"@type":"Answer","text":"We offer virtual warehouse walkthroughs and video calls for prospective clients. Contact us to schedule a virtual tour where we'll show you our operations, security measures, and answer any questions about our processes."}},{"@type":"Question","name":"How do I track my inventory in real-time?","acceptedAnswer":{"@type":"Answer","text":"We provide real-time inventory updates through our client portal. You'll have 24/7 access to view current stock levels, incoming shipments, outbound orders, and historical transaction data. We also send regular inventory reports via email."}},{"@type":"Question","name":"What happens if something gets damaged?","acceptedAnswer":{"@type":"Answer","text":"We take photos of all inventory during receiving and prep. If damage occurs while in our care, we document it immediately and notify you with photo evidence. We're fully insured with Warehouse Legal Liability coverage to protect your inventory. Claims are handled promptly and professionally."}},{"@type":"Question","name":"Do you offer white label services?","acceptedAnswer":{"@type":"Answer","text":"Yes! We can ship orders without any Westfield branding, using your company's branded packaging, inserts, and packing slips. Perfect for maintaining your brand identity in direct-to-consumer fulfillment."}},{"@type":"Question","name":"Do you provide customer support after hours?","acceptedAnswer":{"@type":"Answer","text":"While our standard business hours are Monday-Friday 8 AM to 5 PM PST, we offer emergency support for urgent situations. Your dedicated account manager can be reached for critical issues, and we monitor systems 24/7 to ensure your orders are processed smoothly."}}]}</script>
    <script type="application/ld+json">{"@context":"https://schema.org","@type":"FAQPage","name":"Shipping & Receiving FAQs","mainEntity":[{"@type":"Question","name":"How do I send inventory to you?","acceptedAnswer":{"@type":"Answer","text":"Simply create an Advanced Ship Notice (ASN) through our client portal or email us your shipment details at least 24 hours before arrival. Include your SKU list, quantities, and expected arrival date. We'll provide you with our warehouse address and specific receiving instructions."}},{"@type":"Question","name":"What information needs to be on shipping labels?","acceptedAnswer":{"@type":"Answer","text":"All inbound shipments should be clearly labeled with your company name, reference number or PO number, and 'ATTN: Receiving Department.' Each box should be numbered (Box 1 of 10, Box 2 of 10, etc.) and include a packing list inside one box."}},{"@type":"Question","name":"Can you accept mixed pallets?","acceptedAnswer":{"@type":"Answer","text":"Yes, we accept mixed pallets containing different SKUs. However, clearly labeled boxes and an accurate packing list are essential. Mixed pallets may require additional receiving time and could incur slightly higher receiving fees due to the extra sorting required."}},{"@type":"Question","name":"Do you accept LTL (Less Than Truckload) shipments?","acceptedAnswer":{"@type":"Answer","text":"Absolutely! We accept LTL freight shipments daily. We have a loading dock and equipment to handle pallet deliveries. Make sure to schedule your LTL delivery in advance and provide us with the carrier name, tracking number, and expected delivery date."}},{"@type":"Question","name":"Do you accept FTL (Full Truckload) shipments?","acceptedAnswer":{"@type":"Answer","text":"Yes, we can accommodate FTL shipments for high-volume clients. Due to the size and complexity of full truckload deliveries, please contact us at least 48-72 hours in advance to schedule dock time and ensure adequate space and staffing for unloading."}},{"@type":"Question","name":"What carriers do you work with for outbound shipping?","acceptedAnswer":{"@type":"Answer","text":"We work with all major carriers including UPS, FedEx, USPS, and freight carriers for LTL shipments. We have established relationships to ensure competitive shipping rates and reliable delivery to fulfillment centers for all e-commerce platforms."}},{"@type":"Question","name":"Do you offer international shipping?","acceptedAnswer":{"@type":"Answer","text":"Yes! We can ship internationally to most countries worldwide. We handle customs documentation and work with international carriers to ensure smooth cross-border delivery. International shipping rates and transit times vary by destination."}},{"@type":"Question","name":"Can you ship to Hawaii and Alaska?","acceptedAnswer":{"@type":"Answer","text":"Yes, we ship to all 50 states including Hawaii and Alaska. Shipping times and costs for these locations may differ from continental US deliveries due to the additional transit required."}},{"@type":"Question","name":"Do you provide tracking information?","acceptedAnswer":{"@type":"Answer","text":"Yes, we provide tracking numbers for all outbound shipments. You'll receive tracking information via email or through our client portal as soon as orders ship. Real-time tracking updates keep you and your customers informed of delivery status."}},{"@type":"Question","name":"What's your receiving process when inventory arrives?","acceptedAnswer":{"@type":"Answer","text":"Upon arrival, we check in your inventory, verify quantities against your ASN, inspect for damage, and take photos for documentation. Items are then labeled and stored in your designated warehouse location. You'll receive a receiving report with photos typically within 24 hours of delivery."}}]}</script>
    <script type="application/ld+json">{"@context":"https://schema.org","@type":"FAQPage","name":"Shopify & DTC Fulfillment FAQs","mainEntity":[{"@type":"Question","name":"What are your same-day cutoff times?","acceptedAnswer":{"@type":"Answer","text":"Orders placed before 2 PM PST ship the same business day. Orders placed after 2 PM PST will ship the next business day. This applies to all our fulfillment services including Shopify, Amazon FBA, TikTok Shop, and DTC orders."}},{"@type":"Question","name":"Can you handle custom packaging and branded inserts?","acceptedAnswer":{"@type":"Answer","text":"Absolutely! We specialize in custom kitting, branded tissue paper, thank-you cards, promotional inserts, and gift wrapping services. We help you create memorable unboxing experiences for your customers."}},{"@type":"Question","name":"Do you offer same-day Shopify order processing?","acceptedAnswer":{"@type":"Answer","text":"Yes! Orders received before 2 PM PST are picked, packed, and shipped the same day. This fast turnaround is one of our key advantages as a boutique fulfillment center."}},{"@type":"Question","name":"What's your accuracy rate for Shopify order fulfillment?","acceptedAnswer":{"@type":"Answer","text":"We maintain a 99.8% accuracy rate for order fulfillment. Every order is double-checked during picking and packing, and we provide photo documentation of each shipment for quality assurance."}},{"@type":"Question","name":"Can you handle subscription box fulfillment for Shopify?","acceptedAnswer":{"@type":"Answer","text":"Yes! We're experienced in subscription box fulfillment with recurring monthly shipments, custom kitting, and themed packaging. Perfect for subscription-based Shopify businesses."}},{"@type":"Question","name":"What shipping carriers do you use for Shopify orders?","acceptedAnswer":{"@type":"Answer","text":"We use USPS, UPS, FedEx, and regional carriers depending on your preference and shipping zones. We'll recommend the most cost-effective carrier for your specific needs and can integrate your own carrier accounts if preferred."}},{"@type":"Question","name":"Do you offer international Shopify fulfillment?","acceptedAnswer":{"@type":"Answer","text":"Yes, we ship internationally to most countries worldwide. We handle customs forms and work with international carriers to ensure smooth delivery. International rates vary by destination and package weight."}},{"@type":"Question","name":"Can you handle pre-orders and backorders?","acceptedAnswer":{"@type":"Answer","text":"Yes! We can manage pre-order campaigns and hold orders until inventory arrives. Once stock is received, we'll immediately process and ship backorders in the order they were placed."}},{"@type":"Question","name":"Do you support split shipments and partial fulfillment?","acceptedAnswer":{"@type":"Answer","text":"Yes, if a customer orders multiple items and some are out of stock, we can ship available items immediately and send remaining items when they're back in stock, minimizing customer wait times."}},{"@type":"Question","name":"Can you handle gift messages and gift wrapping?","acceptedAnswer":{"@type":"Answer","text":"Absolutely! We offer gift wrapping services, custom gift messages, and special occasion packaging. Perfect for customers sending gifts directly to recipients."}},{"@type":"Question","name":"How do you manage inventory across multiple Shopify stores?","acceptedAnswer":{"@type":"Answer","text":"Our WMS can sync inventory across multiple Shopify stores in real-time, ensuring accurate stock levels across all your sales channels and preventing overselling."}},{"@type":"Question","name":"Can you handle fragile or oversized Shopify products?","acceptedAnswer":{"@type":"Answer","text":"Yes! We have experience handling delicate items (glassware, electronics, cosmetics) and oversized products (furniture, large home goods). We use appropriate packaging materials and methods to ensure safe delivery."}},{"@type":"Question","name":"Do you handle DTC (Direct-to-Consumer) fulfillment?","acceptedAnswer":{"@type":"Answer","text":"Yes! We provide comprehensive DTC fulfillment services with branded packaging, custom inserts, and personalized unboxing experiences. Standard orders are $2.50 per order, and oversized items are $8.00 per order. Perfect for Shopify stores and direct customer shipping."}}]}</script>
    <script type="application/ld+json">{"@context":"https://schema.org","@type":"FAQPage","name":"Amazon FBA Specific FAQs","mainEntity":[{"@type":"Question","name":"What Amazon compliance standards do you follow?","acceptedAnswer":{"@type":"Answer","text":"We stay up-to-date with all Amazon FBA requirements including polybag suffocation warnings, proper labeling (FNSKU), weight limits, accurate case labels, box size requirements, and shipment plan compliance. We ensure your inventory meets all FBA standards."}},{"@type":"Question","name":"Can you handle hazmat and lithium battery products?","acceptedAnswer":{"@type":"Answer","text":"Yes, we're equipped to handle hazmat and lithium battery products that require special packaging and labeling for Amazon FBA compliance. We follow all regulations for shipping dangerous goods and restricted items."}},{"@type":"Question","name":"Do you support Amazon Vendor Central shipments?","acceptedAnswer":{"@type":"Answer","text":"Yes! We handle both Seller Central (FBA) and Vendor Central shipments, including routing requests, carton labeling, and compliance with vendor-specific requirements like GS1 barcodes and advanced ship notices (ASNs)."}},{"@type":"Question","name":"What's your experience with FBA shipment plans?","acceptedAnswer":{"@type":"Answer","text":"We're highly experienced with Amazon's shipment plan requirements. We can split your inventory across multiple FBA warehouses as directed by Amazon, create compliant box labels, and provide all necessary documentation (BOLs, commercial invoices)."}},{"@type":"Question","name":"Can you handle Amazon Seller Fulfilled Prime (SFP)?","acceptedAnswer":{"@type":"Answer","text":"While we primarily focus on FBA prep and shipments to Amazon warehouses, we can discuss Seller Fulfilled Prime (SFP) requirements for high-volume sellers. Contact us to explore this option."}},{"@type":"Question","name":"Do you offer expiration date labeling for consumables?","acceptedAnswer":{"@type":"Answer","text":"Yes! For products with expiration dates (food, supplements, cosmetics), we apply clear expiration date labels that meet Amazon's requirements. We can also track and manage inventory based on expiration dates (FEFO - First Expired, First Out)."}},{"@type":"Question","name":"How do you handle Amazon inventory discrepancies?","acceptedAnswer":{"@type":"Answer","text":"We document every step with photos during receiving and prep. If Amazon reports a discrepancy, we have complete photo evidence of what was sent, quantities, condition, and labels applied. This documentation helps resolve disputes quickly."}},{"@type":"Question","name":"Can you create multi-unit bundles for Amazon?","acceptedAnswer":{"@type":"Answer","text":"Absolutely! We can create bundled sets, multi-packs, and kitted products that comply with Amazon's bundling policies. Each bundle receives a unique FNSKU and is packaged to Amazon's specifications."}},{"@type":"Question","name":"Do you support Amazon FBA Small and Light program?","acceptedAnswer":{"@type":"Answer","text":"Yes, we can prep items for Amazon's Small and Light program, which has specific size and weight requirements. We ensure your products meet the strict packaging and labeling standards for this program."}},{"@type":"Question","name":"How do you handle Amazon returns and refurbishments?","acceptedAnswer":{"@type":"Answer","text":"We can receive Amazon returns, inspect them, repackage sellable items, and prep them for return to FBA. We document damage, discard unsellable items, and provide detailed reports on return condition and disposition."}},{"@type":"Question","name":"Can you manage multiple Amazon seller accounts?","acceptedAnswer":{"@type":"Answer","text":"Yes! We can handle inventory for multiple Amazon seller accounts under the same client, keeping each account's inventory separate and properly labeled with the correct FNSKU for each account."}},{"@type":"Question","name":"Do you provide BOL and freight documentation?","acceptedAnswer":{"@type":"Answer","text":"Yes, we provide complete freight documentation including Bills of Lading (BOL), pallet labels, and commercial invoices for LTL shipments to Amazon fulfillment centers. All documentation meets Amazon's carrier requirements."}},{"@type":"Question","name":"Can you handle oversize/heavy bulky items?","acceptedAnswer":{"@type":"Answer","text":"Yes, we have the equipment and expertise to handle oversize and heavy/bulky items for Amazon FBA. We'll ensure proper labeling, packaging reinforcement, and compliance with Amazon's special handling requirements."}}]}</script>
    <script type="application/ld+json">{"@context":"https://schema.org","@type":"FAQPage","name":"TikTok Shop & Social Commerce FAQs","mainEntity":[{"@type":"Question","name":"Can you handle viral spikes in orders?","acceptedAnswer":{"@type":"Answer","text":"Yes! Our team is experienced in handling sudden order volume spikes common with TikTok viral products. We can scale quickly to meet demand and maintain our same-day shipping commitment even during high-volume periods."}},{"@type":"Question","name":"What about creator-friendly unboxing?","acceptedAnswer":{"@type":"Answer","text":"We specialize in creating Instagram and TikTok-worthy unboxing experiences with branded tissue paper, thank-you cards, stickers, and custom inserts that encourage customers to share their unboxing on social media."}},{"@type":"Question","name":"How fast can you fulfill trending products?","acceptedAnswer":{"@type":"Answer","text":"With our 2 PM PST same-day cutoff, trending products ordered in the morning ship the same day. We understand the importance of speed in social commerce and prioritize rapid fulfillment for viral items."}},{"@type":"Question","name":"Can you handle influencer collaboration orders?","acceptedAnswer":{"@type":"Answer","text":"Absolutely! We can fulfill special influencer orders with custom packaging, personalized notes, and rush processing. Perfect for influencer gifting campaigns and collaboration launches."}},{"@type":"Question","name":"How fast can you scale for viral products?","acceptedAnswer":{"@type":"Answer","text":"As a boutique operation, we can adapt quickly to volume changes. If your product goes viral, contact us immediately and we'll adjust staffing and resources to handle the surge. We've successfully managed multiple viral product campaigns."}},{"@type":"Question","name":"Do you offer rush processing for trending items?","acceptedAnswer":{"@type":"Answer","text":"Yes! Rush services are available for urgent shipments, with an additional 30-60% fee. This ensures your trending products get priority picking, packing, and same-day shipping even during busy periods."}},{"@type":"Question","name":"Can you create custom bundles for TikTok promotions?","acceptedAnswer":{"@type":"Answer","text":"Yes, we can quickly assemble promotional bundles, limited edition sets, and special offers popular on TikTok Shop. We're experienced in fast-turnaround kitting for social media campaigns."}},{"@type":"Question","name":"Do you support TikTok Shop returns and exchanges?","acceptedAnswer":{"@type":"Answer","text":"Yes, we handle returns and exchanges for TikTok Shop orders. We'll inspect returned items, process refunds or exchanges, and restock sellable inventory according to your return policy."}},{"@type":"Question","name":"How do you handle flash sale fulfillment?","acceptedAnswer":{"@type":"Answer","text":"We're well-equipped for flash sale events common on TikTok Shop. With advance notice, we can pre-pick popular items and have them ready for immediate packing and shipping when the sale goes live."}},{"@type":"Question","name":"Can you ship internationally for TikTok Shop?","acceptedAnswer":{"@type":"Answer","text":"Yes, we offer international shipping to expand your TikTok Shop reach globally. We handle customs documentation and work with international carriers for smooth cross-border delivery."}},{"@type":"Question","name":"Do you offer branded packaging for TikTok creators?","acceptedAnswer":{"@type":"Answer","text":"Yes! Custom branded packaging is one of our specialties. We can include your logo, brand colors, custom tissue paper, stickers, thank-you cards, and promotional inserts to create memorable unboxing moments."}}]}</script>
    <script type="application/ld+json">{"@context":"https://schema.org","@type":"FAQPage","name":"Pricing & Payment FAQs","mainEntity":[{"@type":"Question","name":"How does your pricing model work?","acceptedAnswer":{"@type":"Answer","text":"Contact us for a custom quote tailored to your specific volume and service needs. Fill out our contact form or call (818) 935-5478 for detailed pricing information based on your requirements."}},{"@type":"Question","name":"Are there any hidden fees?","acceptedAnswer":{"@type":"Answer","text":"No hidden fees! We provide transparent, detailed pricing for all services upfront. Contact us for a comprehensive pricing breakdown customized to your business needs."}},{"@type":"Question","name":"Do you offer volume discounts?","acceptedAnswer":{"@type":"Answer","text":"Yes, we offer competitive volume discounts for high-volume clients. Contact us with your monthly order volume to receive a custom pricing proposal."}},{"@type":"Question","name":"What are your rates for prep services?","acceptedAnswer":{"@type":"Answer","text":"Prep service rates vary based on the specific services required (labeling, polybagging, bundling, etc.). Contact us with details about your products and prep needs for accurate pricing."}},{"@type":"Question","name":"When do I get invoiced and what payment methods do you accept?","acceptedAnswer":{"@type":"Answer","text":"We invoice at the end of each month for services provided during that billing period. We accept ACH transfers, wire transfers, and credit cards. New clients require a $300 deposit for the first 2 months. Contact us to discuss payment terms."}}]}</script>
    <script type="application/ld+json">{"@context":"https://schema.org","@type":"FAQPage","name":"Turnaround Times & Speed FAQs","mainEntity":[{"@type":"Question","name":"What are your turnaround times?","acceptedAnswer":{"@type":"Answer","text":"As a boutique operation, we pride ourselves on same-day turnaround for orders placed before 2 PM PST. Our team allows us to process and ship significantly faster than larger prep centers. Rush services are available for urgent shipments, with an additional 30-60% fee."}},{"@type":"Question","name":"What is your same-day cutoff time?","acceptedAnswer":{"@type":"Answer","text":"Orders placed before 2 PM PST ship the same business day. Orders placed after 2 PM PST will ship the next business day. This applies to all our fulfillment services including Shopify, Amazon FBA, TikTok Shop, and DTC orders."}},{"@type":"Question","name":"What's your turnaround time for urgent Amazon prep?","acceptedAnswer":{"@type":"Answer","text":"For rush Amazon FBA prep, we can typically complete receiving, prepping, and shipping to Amazon within 24-48 hours depending on the volume and complexity of prep work required. Contact us for expedited service."}},{"@type":"Question","name":"Do you offer rush processing?","acceptedAnswer":{"@type":"Answer","text":"Yes! Rush services are available for urgent shipments with an additional 30-60% fee depending on the urgency and volume. This ensures priority handling and same-day or next-day completion."}},{"@type":"Question","name":"What's your on-time ship rate?","acceptedAnswer":{"@type":"Answer","text":"We maintain a 99.5% on-time ship rate for orders placed before our 2 PM PST cutoff. Our boutique size allows us to maintain exceptional speed and reliability."}},{"@type":"Question","name":"Can you handle weekend or holiday orders?","acceptedAnswer":{"@type":"Answer","text":"Our standard hours are Monday-Friday, but we can arrange weekend or holiday processing for urgent situations with advance notice. Additional fees may apply for after-hours service."}}]}</script>
    <script type="application/ld+json">{"@context":"https://schema.org","@type":"FAQPage","name":"Quality Control & Documentation FAQs","mainEntity":[{"@type":"Question","name":"Do you provide photo proof of your work?","acceptedAnswer":{"@type":"Answer","text":"Yes! We provide photo verification and quality control documentation for every step of the prep process. Every shipment is documented with timestamped photos, ensuring transparency and peace of mind for our clients."}},{"@type":"Question","name":"Do you offer photo documentation for QC?","acceptedAnswer":{"@type":"Answer","text":"Absolutely! We photograph all inventory during receiving, prep work, and final packaging. These photos are available in your client portal and serve as proof of work and protection against disputes."}},{"@type":"Question","name":"Do you provide inventory reports and tracking?","acceptedAnswer":{"@type":"Answer","text":"Yes, we provide real-time inventory updates, photo documentation, and tracking numbers for all shipments. You'll have complete visibility into your inventory and order status at all times."}},{"@type":"Question","name":"How do you ensure marketplace compliance?","acceptedAnswer":{"@type":"Answer","text":"We stay up-to-date with all major marketplace requirements including Amazon FBA, Walmart, TikTok Shop, Shopify, and other e-commerce platforms. This includes polybag suffocation warnings, weight limits, accurate case labels, fire & theft prevention, data security & confidentiality, and sustainable practices. We're fully insured with General Liability and Warehouse Legal Liability coverage."}},{"@type":"Question","name":"What's your accuracy rate for order fulfillment?","acceptedAnswer":{"@type":"Answer","text":"We maintain a 99.8% accuracy rate across all order fulfillment. Every order goes through our double-check quality control process during picking and packing to ensure the right products are shipped to the right customers."}},{"@type":"Question","name":"How do you handle discrepancies?","acceptedAnswer":{"@type":"Answer","text":"We document everything with photos during receiving. If there's a discrepancy between what you sent and what we received, we notify you immediately with photo evidence and a detailed report. We work with you to resolve any issues quickly and fairly."}},{"@type":"Question","name":"Do you perform quality inspections on incoming inventory?","acceptedAnswer":{"@type":"Answer","text":"Yes, we inspect all incoming inventory for damage, verify quantities, check product condition, and document everything with photos. This protects both you and us by establishing a clear record of inventory condition upon arrival."}}]}</script>
    <script type="application/ld+json">{"@context":"https://schema.org","@type":"FAQPage","name":"Location & Logistics FAQs","mainEntity":[{"@type":"Question","name":"Where is Westfield Prep Center located?","acceptedAnswer":{"@type":"Answer","text":"We're based in Los Angeles with easy access to major carriers for efficient shipping to fulfillment centers nationwide. Our strategic West Coast location ensures fast shipping times."}},{"@type":"Question","name":"Why is Los Angeles a strategic location?","acceptedAnswer":{"@type":"Answer","text":"Los Angeles is a major logistics hub with access to the nation's largest port complex (LA/Long Beach), close proximity to international airports, and excellent carrier infrastructure. This means lower shipping costs, faster transit times, and easy import/export for international sellers."}},{"@type":"Question","name":"Do you offer international shipping?","acceptedAnswer":{"@type":"Answer","text":"Yes! We can ship internationally to most countries worldwide. We handle customs documentation and work with international carriers to ensure smooth cross-border delivery. International shipping rates and transit times vary by destination."}},{"@type":"Question","name":"What carriers do you work with?","acceptedAnswer":{"@type":"Answer","text":"We work with all major carriers including UPS, FedEx, USPS, and freight carriers for LTL shipments. We have established relationships to ensure competitive shipping rates and reliable delivery to fulfillment centers for all ecommerce platforms."}},{"@type":"Question","name":"Can you ship to Hawaii and Alaska?","acceptedAnswer":{"@type":"Answer","text":"Yes, we ship to all 50 states including Hawaii and Alaska. Shipping times and costs for these locations may differ from continental US deliveries due to the additional transit required."}},{"@type":"Question","name":"Do you handle customs documentation?","acceptedAnswer":{"@type":"Answer","text":"Yes, for international shipments we prepare all necessary customs documentation including commercial invoices, certificates of origin, and harmonized tariff codes to ensure smooth customs clearance."}}]}</script>
    <script type="application/ld+json">{"@context":"https://schema.org","@type":"FAQPage","name":"Insurance & Security FAQs","mainEntity":[{"@type":"Question","name":"Are you insured?","acceptedAnswer":{"@type":"Answer","text":"Yes, we are fully insured with both General Liability and Warehouse Legal Liability insurance to protect your inventory. We also maintain fire & theft prevention measures and data security protocols."}},{"@type":"Question","name":"What insurance coverage do you have?","acceptedAnswer":{"@type":"Answer","text":"We carry comprehensive General Liability insurance and Warehouse Legal Liability coverage. This protects your inventory while in our care against damage, theft, fire, and other covered losses."}},{"@type":"Question","name":"How do you protect my inventory?","acceptedAnswer":{"@type":"Answer","text":"We protect your inventory through multiple layers: 24/7 video surveillance, controlled access entry systems, fire suppression systems, climate-controlled storage for sensitive items, and full insurance coverage. All inventory is tracked in our WMS from receiving to shipping."}},{"@type":"Question","name":"What security measures are in place at your warehouse?","acceptedAnswer":{"@type":"Answer","text":"Our facility features 24/7 video surveillance, controlled access entry, alarm systems, fire detection and suppression, secure inventory storage areas, and regular security audits. We take inventory protection seriously."}}]}</script>
    <script type="application/ld+json">{"@context":"https://schema.org","@type":"FAQPage","name":"Special Handling & Custom Services FAQs","mainEntity":[{"@type":"Question","name":"Can you create custom bundles?","acceptedAnswer":{"@type":"Answer","text":"Yes! We can create product bundles, gift sets, promotional packages, and multi-item kits. Perfect for holiday promotions, subscription boxes, and special campaigns. We handle all aspects of kitting from assembly to custom packaging."}},{"@type":"Question","name":"Do you handle subscription box fulfillment?","acceptedAnswer":{"@type":"Answer","text":"Yes, we're experienced in subscription box fulfillment with recurring monthly shipments, themed packaging, and custom inserts. We can manage variable subscription tiers and handle monthly kitting for subscription-based businesses."}},{"@type":"Question","name":"Can you handle influencer collaboration orders?","acceptedAnswer":{"@type":"Answer","text":"Absolutely! We can fulfill special influencer orders with custom packaging, personalized notes, and rush processing. Perfect for influencer gifting campaigns and collaboration launches."}},{"@type":"Question","name":"Do you support returns and exchanges?","acceptedAnswer":{"@type":"Answer","text":"Yes, we can receive and process customer returns, inspect items for restocking, handle exchanges, and provide detailed return reports. We'll work with you to establish a returns process that fits your business."}},{"@type":"Question","name":"Can you handle pre-orders and backorders?","acceptedAnswer":{"@type":"Answer","text":"Yes! We can manage pre-order campaigns and hold orders until inventory arrives. Once stock is received, we'll immediately process and ship backorders in the order they were placed."}},{"@type":"Question","name":"Do you offer kitting and assembly services?","acceptedAnswer":{"@type":"Answer","text":"Yes! We provide comprehensive kitting services including product assembly, bundling multiple items together, adding promotional inserts, gift boxing, and creating ready-to-ship product sets. Perfect for subscription boxes and promotional campaigns."}},{"@type":"Question","name":"What services does Westfield Prep Center offer?","acceptedAnswer":{"@type":"Answer","text":"We offer comprehensive ecommerce fulfillment services including Amazon FBA prep, Walmart fulfillment, TikTok Shop fulfillment, Shopify order fulfillment, DTC (Direct-to-Consumer) fulfillment, receiving & inspection, polybagging, bubble wrap, bundling, product labeling (including FNSKU), case pack & carton prep, branded packaging, custom kitting, LTL & SPD shipping, and photo proof of every step. We also provide storage solutions."}}]}</script>
